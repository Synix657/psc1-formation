<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion Administration</title>

<style>

body{
    font-family:Poppins,sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    width:350px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#004080;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#0066cc;
}

</style>
</head>
<body>

<div class="box">

<h2>Administration PSC1</h2>

<input
type="password"
id="password"
placeholder="Mot de passe">

<button onclick="connexion()">
Connexion
</button>

</div>

<script>

function connexion(){

    const password =
        document.getElementById("password").value;

    if(password === "8718"){

        window.location.href =
        "http://localhost:3000/admin";

    }else{

        alert("Mot de passe incorrect");

    }

}

</script>

</body>
</html>
